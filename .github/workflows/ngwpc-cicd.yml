name: CI/CD Pipeline

on:
  pull_request:
    branches: [ngwpc-candidate, ngwpc-release, main, nwm-main, development, release-candidate]
  push:
    branches: [ngwpc-candidate, ngwpc-release, main, nwm-main, development, release-candidate]
  release:
    types: [published]
  repository_dispatch:
    types: [base_image_published]
  workflow_dispatch:
    inputs:
      trigger_downstream:
        description: 'PENDING APPROVAL: Trigger downstream repositories pipeline after successful run'
        required: true
        type: boolean

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io

jobs:
  # set variables for use in other jobs
  setup:
    name: setup
    runs-on: ubuntu-latest
    outputs:
      org: ${{ steps.vars.outputs.org }}
      image_base: ${{ steps.vars.outputs.image_base }}
      pr_tag: ${{ steps.vars.outputs.pr_tag }}
      commit_sha: ${{ steps.vars.outputs.commit_sha }}
      commit_sha_short: ${{ steps.vars.outputs.commit_sha_short }}
      test_image_tag: ${{ steps.vars.outputs.test_image_tag }}
      alias_tag: ${{ steps.vars.outputs.alias_tag }}
      forcing_tag: ${{ steps.vars.outputs.forcing_tag }}
      clean_ref: ${{ steps.vars.outputs.clean_ref }}
    steps:
      - name: Compute image vars
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          # one datetime for all time variables
          NOW=$(date -u +'%Y-%m-%d %H:%M:%S')

          # for OCI labels
          BUILD_DATE=$(date -u -d "$NOW" +'%Y-%m-%dT%H:%M:%SZ')

          # for Docker image tags
          TIMESTAMP=$(date -u -d "$NOW" +'%Y%m%d%H%M%SZ')

          # set forcing tag from payload or default to 'latest'
          if [ -n "${{ github.event.client_payload.forcing_tag || '' }}" ]; then
            FORCING_TAG="${{ github.event.client_payload.forcing_tag }}"
          else
            FORCING_TAG="latest"
          fi

          # logic to get the real branch name even on pull requests
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            REAL_REF="${{ github.head_ref }}"
          else
            REAL_REF="${{ github.ref_name }}"
          fi

          # clean ref name and short commit sha
          CLEAN_REF=$(echo "$REAL_REF" | tr '[:upper:]' '[:lower:]' | sed 's/\//-/g')
          SHORT_SHA="${GITHUB_SHA:0:12}"

          # set variables to use with Docker images
          ORG="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          REPO="$(basename "${GITHUB_REPOSITORY}")"
          IMAGE_BASE="${REGISTRY}/${ORG}/${REPO}"

          # logic for the tags:
          # test_image_tag: used for the initial build and test
          # alias_tag: used for final tagging on successful tests
          # for pull requests, use pr-<pr-number>-build
          # for workflow_dispatch and pushes, use <timestamp>-<clean-ref-name>

          # test tag is always commit short sha
          TEST_TAG="${SHORT_SHA}"

          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            ALIAS="pr-${{ github.event.pull_request.number }}-build"
          elif [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] || [ "$GITHUB_EVENT_NAME" = "push" ]; then
            ALIAS="${TIMESTAMP}-${CLEAN_REF}"
          else
            ALIAS="${SHORT_SHA}" # fallback
          fi

          # save outputs
          echo "org=${ORG}" >> "$GITHUB_OUTPUT"
          echo "image_base=${IMAGE_BASE}" >> "$GITHUB_OUTPUT"
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"
          echo "forcing_tag=${FORCING_TAG}" >> "$GITHUB_OUTPUT"
          echo "test_image_tag=${TEST_TAG}" >> "$GITHUB_OUTPUT"
          echo "alias_tag=${ALIAS}" >> "$GITHUB_OUTPUT"
          echo "commit_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "commit_sha_short=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "clean_ref=${CLEAN_REF}" >> "$GITHUB_OUTPUT"

  # CodeQL scan
  codeql-scan:
    name: codeql-scan
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'push') ||
      (github.event_name == 'repository_dispatch') ||
      (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    needs: [setup]
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ mpi-default-bin libopenmpi-dev libboost-all-dev libudunits2-dev libnetcdf-dev libnetcdf-c++4-dev
          python3 -m pip install numpy==1.26.4 netcdf4 bmipy pandas torch pyyaml pyarrow
          #python3 -m pip install -r extern/test_bmi_py/requirements.txt
          #python3 -m pip install -r extern/t-route/requirements.txt

      # Initialize CodeQL (C++ selected)
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: cpp

      # Build (replicate your CMake build commands from Dockerfile or local builds)
      - name: Build C++ code
        env:
          PYTHONPATH: ${{ env.PYTHONPATH }}
        run: |
          cmake -B cmake_build -S . \
            -DPYTHON_EXECUTABLE=$(which python3) \
            -DNGEN_WITH_MPI=ON \
            -DNGEN_WITH_NETCDF=ON \
            -DNGEN_WITH_SQLITE=ON \
            -DNGEN_WITH_UDUNITS=ON \
            -DNGEN_WITH_BMI_FORTRAN=ON \
            -DNGEN_WITH_BMI_C=ON \
            -DNGEN_WITH_PYTHON=ON \
            -DNGEN_WITH_TESTS=OFF \
            -DNGEN_WITH_ROUTING=ON \
            -DNGEN_QUIET=ON \
            -DNGEN_UPDATE_GIT_SUBMODULES=OFF \
            # Using boost from apt for simplicity and code scanning
            #-DBOOST_ROOT=/opt/boost
          cmake --build cmake_build --target all

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

# build ngen Docker image
  build:
    name: build
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'push') ||
      (github.event_name == 'repository_dispatch') ||
      (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    needs: [setup]
    outputs:
      digest: ${{ steps.build_image.outputs.digest }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Verify submodules recursively
        run: |
          echo "Checking all submodules recursively..."
          git submodule update --init --recursive
          git submodule status --recursive

          echo "Listing files in each submodule..."
          git submodule foreach --recursive '
            echo "=== $name ==="
            pwd
            ls -l
          '

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        id: build_image
        uses: docker/build-push-action@v6
        env:
          BUILD_DATE: ${{ env.BUILD_DATE }}
        with:
          context: .
          # file: Dockerfile.test # comment out when done testing
          push: true
          tags: ${{ needs.setup.outputs.image_base }}:${{ needs.setup.outputs.test_image_tag }}
          build-args: |
            ORG=${{ needs.setup.outputs.org }}
            NGEN_FORCING_IMAGE_TAG=${{ needs.setup.outputs.forcing_tag }}
            BASE_IMAGE_DIGEST=${{ github.event.client_payload.digest || 'unknown' }}
            BASE_IMAGE_REVISION=${{ github.event.client_payload.source_sha || 'unknown' }}
            IMAGE_SOURCE=https://github.com/${{ github.repository }}
            IMAGE_VENDOR=${{ github.repository_owner }}
            IMAGE_VERSION=${{ github.ref_name }}
            IMAGE_REVISION=${{ github.sha }}
            IMAGE_CREATED=${{ env.BUILD_DATE }}
            CI_COMMIT_REF_NAME=${{ needs.setup.outputs.clean_ref }}

# run unit tests inside the built Docker image
  unit-test:
    name: unit-test
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'push') ||
      (github.event_name == 'repository_dispatch') ||
      (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    needs:
      [
        setup,
        build
      ]
    container:
      image: ${{ needs.setup.outputs.image_base }}:${{ needs.setup.outputs.test_image_tag }}
    steps:
      - name: Run unit tests
        run: |
          echo "Running unit tests..."
          cd /ngen-app/ngen/cmake_build
          ctest || {
            echo "Tests failed. Rerunning failed tests with verbose output...";
            export CTEST_OUTPUT_ON_FAILURE=1;
            ctest --rerun-failed --output-on-failure --verbose;
            exit 1;
          }

# run container security scan using Trivy
  container-scanning:
    name: container-scanning
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'push') ||
      (github.event_name == 'repository_dispatch') ||
      (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    needs:
      [
        setup,
        build
      ]
    steps:
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.2
        with:
          cache: true
          version: v0.68.2

      - name: Trivy scan
        env:
          TMPDIR: /mnt/trivy-temp
        run: |
          sudo mkdir -p $TMPDIR
          sudo chown -R $USER:$USER $TMPDIR

          trivy image \
            --format sarif \
            --output trivy-results.sarif \
            --severity CRITICAL,HIGH \
            --scanners vuln \
            --ignore-unfixed \
            --timeout 45m \
            ${{ needs.setup.outputs.image_base }}:${{ needs.setup.outputs.test_image_tag }}

# promote Docker image tags after successful tests
  promote-tags:
    name: Promote Tags
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'push') ||
      (github.event_name == 'repository_dispatch') ||
      (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    needs:
      [
        setup,
        codeql-scan,
        build,
        unit-test,
        container-scanning,
      ]
    steps:
      - name: Tag image with alias and latest
        shell: bash
        run: |
          set -euo pipefail

          # ensure skopeo is available for promotion
          if ! command -v skopeo >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y --no-install-recommends skopeo
          fi

          IMAGE_BASE="${{ needs.setup.outputs.image_base }}"
          TEST_TAG="${{ needs.setup.outputs.test_image_tag }}"
          ALIAS_TAG="${{ needs.setup.outputs.alias_tag }}"

          # apply the primary alias (pr tag or timestamp-branch)
          skopeo copy \
            --src-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            --all \
            "docker://${IMAGE_BASE}:${TEST_TAG}" "docker://${IMAGE_BASE}:${ALIAS_TAG}"

          # additionally tag with 'latest' if on development branch push
          if [ "$GITHUB_EVENT_NAME" = "push" ] && [ "$GITHUB_REF_NAME" = "development" ]; then
            skopeo copy \
              --src-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
              --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
              --all \
              "docker://${IMAGE_BASE}:${TEST_TAG}" "docker://${IMAGE_BASE}:latest"
          fi

# tag official release Docker image with release tag
  release:
    name: release
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Get commit sha for the tag
        id: rev
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="${{ github.event.release.tag_name }}"
          REPO="${{ github.repository }}"

          REF_JSON="$(gh api "repos/${REPO}/git/refs/tags/${TAG}")"
          OBJ_SHA="$(jq -r '.object.sha' <<<"$REF_JSON")"
          OBJ_TYPE="$(jq -r '.object.type' <<<"$REF_JSON")"

          if [ "$OBJ_TYPE" = "tag" ]; then
            TAG_OBJ="$(gh api "repos/${REPO}/git/tags/${OBJ_SHA}")"
            COMMIT_SHA="$(jq -r '.object.sha' <<<"$TAG_OBJ")"
          else
            COMMIT_SHA="$OBJ_SHA"
          fi

          SHORT_SHA="${COMMIT_SHA:0:12}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Tag image with release tag
        shell: bash
        run: |
          set -euo pipefail

          IMAGE_BASE="${{ needs.setup.outputs.image_base }}"
          SHORT_SHA="${{ steps.rev.outputs.short_sha }}"
          RELEASE_TAG="${{ github.event.release.tag_name }}"

          # ensure skopeo is available
          if ! command -v skopeo >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y --no-install-recommends skopeo
          fi

          skopeo copy \
            --src-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            docker://"${IMAGE_BASE}:${SHORT_SHA}" docker://"${IMAGE_BASE}:${RELEASE_TAG}"

